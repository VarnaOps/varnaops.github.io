<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VarnaOps | AI/ML & Python Engineering</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #ffffff;
            --accent: #00ffcc;
            --secondary: #888;
            --border: #333;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container { 
            max-width: 650px; 
            padding: 20px; 
        }
        h1 { 
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 2.8rem; 
            margin-bottom: 0.5rem; 
            font-weight: 700;
            letter-spacing: 1px; /* Font tecnico, più respiro */
        }
        .tagline { 
            color: var(--accent); 
            font-weight: 600; 
            margin-bottom: 1.5rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            font-size: 0.8rem; 
            font-family: monospace;
        }
        p { 
            color: var(--secondary); 
            font-size: 1.1rem; 
            line-height: 1.6; 
            margin-bottom: 2.5rem; 
        }
        
        .contact-link {
            display: inline-block;
            color: var(--text);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.2s ease;
            border: 1px solid var(--border);
            padding: 12px 40px;
            border-radius: 4px;
        }
        .contact-link:hover {
            color: var(--accent);
            border-color: var(--accent);
            background-color: rgba(0, 255, 204, 0.05);
        }

        .footer { 
            position: absolute; 
            bottom: 30px; 
            font-size: 0.75rem; 
            color: #444; 
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>VarnaOps LLC</h1>
        <div class="tagline">Applied AI/ML • Python Engineering • Scalable Systems</div>
        
        <p>
            Expert-level Python development and AI/ML engineering.
        </p>
        
        <a href="mailto:leonardo@varnaops.com" class="contact-link">Contact for Contractor Roles</a>
    </div>

    <div class="footer">
        © 2026 VarnaOps LLC | Registered US Entity
    </div>
</body>
</html>
