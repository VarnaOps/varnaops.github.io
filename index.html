<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VarnaOps</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --panel: #111;
      --text: #f3f3f3;
      --muted: #a0a0a0;
      --line: #262626;
      --accent: #00d8b6;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    .card {
      width: 100%;
      max-width: 680px;
      padding: 48px;
      background: linear-gradient(180deg, #101010 0%, #0d0d0d 100%);
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .eyebrow {
      color: var(--accent);
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 16px 0;
      font-size: clamp(2rem, 4vw, 3.2rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .subhead {
      font-size: 1.08rem;
      line-height: 1.6;
      color: var(--muted);
      max-width: 560px;
      margin-bottom: 32px;
    }

    .cta {
      display: inline-block;
      padding: 12px 18px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 600;
      background: var(--accent);
      color: #041411;
      transition: 0.2s ease;
    }

    .cta:hover {
      opacity: 0.92;
      transform: translateY(-1px);
    }

    .footer {
      margin-top: 36px;
      padding-top: 22px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 0.95rem;
    }

    .footer a {
      color: var(--text);
      text-decoration: none;
    }

    .footer a:hover {
      color: var(--accent);
    }

    @media (max-width: 640px) {
      .card {
        padding: 28px;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">VarnaOps LLC</div>
    <h1>AI-native software for BioPharma </h1>
    <p class="subhead">
      Currently in stealth and under active development.
    </p>

    <a class="cta" href="mailto:leonardo@varnaops.com?subject=VarnaOps%20Inquiry">
      Contact
    </a>

    <div class="footer">
      <a href="mailto:leonardo@varnaops.com">leonardo@varnaops.com</a>
    </div>
  </main>
</body>
</html>
